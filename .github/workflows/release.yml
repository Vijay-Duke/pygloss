name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (without the v prefix)
        required: true
        default: "0.1.1"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Resolve release version
        id: version
        env:
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            value="${GITHUB_REF_NAME#v}"
          else
            value="$MANUAL_VERSION"
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "tag=v$value" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag for manual runs
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists; choose a new version."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Test, verify, and build plugin
        run: ./gradlew test verifyPlugin buildPlugin -PpluginVersion=${{ steps.version.outputs.value }}

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin -PpluginVersion=${{ steps.version.outputs.value }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: gh release create "$RELEASE_TAG" build/distributions/*.zip --generate-notes --title "PyGloss $RELEASE_TAG"
