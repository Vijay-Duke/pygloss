name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (without the v prefix)
        required: true
        default: "0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve release version
        id: version
        env:
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$MANUAL_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Test, verify, and build plugin
        run: ./gradlew test verifyPlugin buildPlugin -PpluginVersion=${{ steps.version.outputs.value }}

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin -PpluginVersion=${{ steps.version.outputs.value }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" build/distributions/*.zip --generate-notes --title "PyGloss $GITHUB_REF_NAME"
